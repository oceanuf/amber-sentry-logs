<!DOCTYPE html>
<html>
<head>
    <title>JavaScript测试</title>
    <style>
        .card { border: 1px solid #ccc; padding: 10px; margin: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>JavaScript执行测试</h1>
    
    <div id="test1">
        <h2>测试1: 简单DOM操作</h2>
        <button onclick="test1()">运行测试1</button>
        <div id="result1"></div>
    </div>
    
    <div id="test2">
        <h2>测试2: ETF数据加载</h2>
        <button onclick="test2()">运行测试2</button>
        <div id="result2"></div>
    </div>
    
    <div id="test3">
        <h2>测试3: 页面完整复制</h2>
        <button onclick="test3()">运行测试3</button>
        <div id="result3"></div>
    </div>
    
    <script>
        // 测试1: 简单DOM操作
        function test1() {
            document.getElementById('result1').innerHTML = 
                '<span class="success">✅ DOM操作正常</span>';
        }
        
        // 测试2: ETF数据测试
        function test2() {
            const etfData = [{"code": "510300", "name": "测试ETF", "sector": "测试赛道"}];
            const result = document.getElementById('result2');
            
            try {
                const sectors = [...new Set(etfData.map(etf => etf.sector))];
                result.innerHTML = `<span class="success">✅ ETF数据处理正常: ${sectors.length}个赛道</span>`;
            } catch (error) {
                result.innerHTML = `<span class="error">❌ ETF数据处理错误: ${error.message}</span>`;
            }
        }
        
        // 测试3: 完整页面逻辑
        function test3() {
            const result = document.getElementById('result3');
            const testDiv = document.createElement('div');
            testDiv.id = 'testGrid';
            testDiv.className = 'etf-grid';
            document.body.appendChild(testDiv);
            
            // 模拟原始数据
            const etfData = [
                {"code": "510300", "name": "华泰柏瑞沪深300ETF", "sector": "战略宽基"},
                {"code": "512480", "name": "国联安半导体ETF", "sector": "科技自立"}
            ];
            
            try {
                // 模拟渲染逻辑
                const grid = document.getElementById('testGrid');
                etfData.forEach(etf => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `${etf.code} - ${etf.name}`;
                    grid.appendChild(card);
                });
                
                result.innerHTML = `<span class="success">✅ 完整渲染正常: ${etfData.length}张卡片</span>`;
            } catch (error) {
                result.innerHTML = `<span class="error">❌ 渲染错误: ${error.message}</span>`;
            }
        }
        
        // 页面加载后自动运行基础测试
        window.addEventListener('DOMContentLoaded', function() {
            console.log('DOM已加载，开始基础测试...');
            test1();
            test2();
        });
    </script>
</body>
</html>
