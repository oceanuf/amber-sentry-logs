<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧀 Obsidian Markdown 渲染器 - 琥珀引擎演武场</title>
    
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/base16/solarized-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Obsidian 深色主题配色 */
            --obsidian-bg: #1a1b26;
            --obsidian-surface: #24283b;
            --obsidian-surface-light: #2a2e3f;
            --obsidian-text: #c0caf5;
            --obsidian-text-muted: #a9b1d6;
            --obsidian-accent: #7aa2f7;
            --obsidian-accent-gold: #e0af68;
            --obsidian-success: #9ece6a;
            --obsidian-warning: #ff9e64;
            --obsidian-error: #f7768e;
            --obsidian-border: #414868;
            --obsidian-code-bg: #292e42;
            --obsidian-progress-blue: #2ac3de;
            --obsidian-progress-green: #73daca;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--obsidian-text);
            background-color: var(--obsidian-bg);
            padding: 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--obsidian-surface);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--obsidian-surface-light) 0%, var(--obsidian-bg) 100%);
            color: var(--obsidian-text);
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid var(--obsidian-border);
        }
        
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 600;
            background: linear-gradient(90deg, var(--obsidian-accent), var(--obsidian-accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header .subtitle {
            font-size: 1rem;
            opacity: 0.8;
            color: var(--obsidian-text-muted);
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .controls {
            background: var(--obsidian-surface-light);
            padding: 20px;
            border-bottom: 1px solid var(--obsidian-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-info {
            font-size: 1.1rem;
            color: var(--obsidian-text);
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .file-info i {
            color: var(--obsidian-accent);
            margin-right: 8px;
        }
        
        .actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            background: var(--obsidian-surface-light);
            color: var(--obsidian-text);
            border: 1px solid var(--obsidian-border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn:hover {
            background: var(--obsidian-accent);
            color: var(--obsidian-bg);
            border-color: var(--obsidian-accent);
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(122, 162, 247, 0.3);
        }
        
        .btn i {
            margin-right: 8px;
        }
        
        .preview {
            padding: 35px;
            color: var(--obsidian-text);
        }
        
        .preview h1, .preview h2, .preview h3, .preview h4, .preview h5, .preview h6 {
            color: var(--obsidian-text);
            margin-top: 1.8em;
            margin-bottom: 0.8em;
            font-weight: 600;
        }
        
        .preview h1 {
            border-bottom: 2px solid var(--obsidian-accent);
            padding-bottom: 12px;
            font-size: 2.2rem;
        }
        
        .preview h2 {
            border-bottom: 1px solid var(--obsidian-border);
            padding-bottom: 8px;
            font-size: 1.8rem;
        }
        
        .preview h3 {
            font-size: 1.5rem;
        }
        
        .preview p {
            margin-bottom: 1.2em;
            color: var(--obsidian-text-muted);
        }
        
        .preview strong {
            color: var(--obsidian-text);
            font-weight: 600;
        }
        
        .preview em {
            color: var(--obsidian-text-muted);
            font-style: italic;
        }
        
        .preview table {
            border-collapse: collapse;
            width: 100%;
            margin: 25px 0;
            border: 1px solid var(--obsidian-border);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .preview table th, .preview table td {
            border: 1px solid var(--obsidian-border);
            padding: 14px 16px;
            text-align: left;
            color: var(--obsidian-text);
        }
        
        .preview table th {
            background: var(--obsidian-surface-light);
            font-weight: 600;
            color: var(--obsidian-accent);
        }
        
        .preview table tr:nth-child(even) {
            background: rgba(36, 40, 59, 0.5);
        }
        
        .preview table tr:hover {
            background: rgba(122, 162, 247, 0.1);
        }
        
        .preview code {
            background: var(--obsidian-code-bg);
            padding: 3px 7px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 0.9em;
            color: var(--obsidian-accent-gold);
        }
        
        .preview pre {
            background: var(--obsidian-code-bg);
            padding: 18px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 25px 0;
            border: 1px solid var(--obsidian-border);
        }
        
        .preview pre code {
            background: transparent;
            padding: 0;
            border-radius: 0;
            color: var(--obsidian-text);
        }
        
        .preview blockquote {
            border-left: 4px solid var(--obsidian-accent);
            padding-left: 22px;
            margin: 25px 0;
            color: var(--obsidian-text-muted);
            font-style: italic;
            background: rgba(122, 162, 247, 0.05);
            padding: 18px;
            border-radius: 0 8px 8px 0;
        }
        
        .preview ul, .preview ol {
            margin: 20px 0;
            padding-left: 28px;
            color: var(--obsidian-text-muted);
        }
        
        .preview li {
            margin-bottom: 8px;
        }
        
        .preview a {
            color: var(--obsidian-accent);
            text-decoration: none;
            border-bottom: 1px dotted var(--obsidian-border);
            transition: all 0.2s ease;
        }
        
        .preview a:hover {
            color: var(--obsidian-accent-gold);
            border-bottom: 1px solid var(--obsidian-accent-gold);
        }
        
        /* 进度条样式 */
        .progress-bar-container {
            display: inline-block;
            width: 120px;
            height: 12px;
            background: var(--obsidian-surface-light);
            border-radius: 6px;
            overflow: hidden;
            vertical-align: middle;
            margin: 0 8px;
            border: 1px solid var(--obsidian-border);
        }
        
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--obsidian-progress-blue), var(--obsidian-progress-green));
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        
        /* 金色呼吸灯效果 */
        .confidence-gold {
            color: var(--obsidian-accent-gold);
            font-weight: 600;
            animation: gold-pulse 2s infinite ease-in-out;
            text-shadow: 0 0 10px rgba(224, 175, 104, 0.5);
        }
        
        @keyframes gold-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* 策略标签 */
        .strategy-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(122, 162, 247, 0.1);
            color: var(--obsidian-accent);
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-right: 6px;
            border: 1px solid rgba(122, 162, 247, 0.3);
        }
        
        .strategy-tag.gold {
            background: rgba(224, 175, 104, 0.1);
            color: var(--obsidian-accent-gold);
            border-color: rgba(224, 175, 104, 0.3);
        }
        
        .strategy-tag.success {
            background: rgba(158, 206, 106, 0.1);
            color: var(--obsidian-success);
            border-color: rgba(158, 206, 106, 0.3);
        }
        
        /* 状态指示器 */
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .status-green { background: var(--obsidian-success); }
        .status-yellow { background: var(--obsidian-warning); }
        .status-red { background: var(--obsidian-error); }
        .status-blue { background: var(--obsidian-accent); }
        
        .footer {
            text-align: center;
            padding: 25px;
            background: var(--obsidian-surface-light);
            border-top: 1px solid var(--obsidian-border);
            color: var(--obsidian-text-muted);
            font-size: 0.9rem;
        }
        
        .footer a {
            color: var(--obsidian-accent);
            text-decoration: none;
            font-weight: 500;
        }
        
        .footer a:hover {
            color: var(--obsidian-accent-gold);
            text-decoration: underline;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                margin: 0;
                border-radius: 0;
            }
            
            .preview {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-gem"></i> Obsidian Markdown 渲染器</h1>
            <div class="subtitle">琥珀引擎演武场 · GitHub/Obsidian 深色美学</div>
        </div>
        
        <div class="controls">
            <div class="file-info">
                <i class="fas fa-file-code"></i> 当前渲染: <span id="filename">正在加载...</span>
            </div>
            <div class="actions">
                <button class="btn" onclick="refreshContent()">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
                <button class="btn" onclick="downloadMarkdown()">
                    <i class="fas fa-download"></i> 下载原始文件
                </button>
                <button class="btn" onclick="window.location.href='./'">
                    <i class="fas fa-home"></i> 返回演武场
                </button>
            </div>
        </div>
        
        <div id="preview" class="preview">
            <div style="text-align: center; padding: 40px;">
                <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--obsidian-accent);"></i>
                <p style="margin-top: 20px;">正在加载 Markdown 文件...</p>
            </div>
        </div>
        
        <div class="footer">
            <p>
                技术栈: <a href="https://marked.js.org/">Marked.js</a> · <a href="https://highlightjs.org/">Highlight.js</a> · <a href="https://fontawesome.com/">Font Awesome</a>
            </p>
            <p>© 2026 Cheese Intelligence Team · 工程师 Cheese 执行 [2613-186号] 视觉工程</p>
            <p><a href="https://gemini.googlemanager.cn:10168/">🏛️ 返回档案馆首页</a></p>
        </div>
    </div>
    
    <script>
        // 配置marked自定义渲染器
        const renderer = new marked.Renderer();
        
        // 重写表格渲染，添加进度条检测
        const originalTable = renderer.table;
        renderer.table = function(header, body) {
            let tableHtml = originalTable.call(this, header, body);
            
            // 检测进度条模式: [▓░░░░░]
            const progressBarRegex = /\[(▓+)(░+)\]/g;
            tableHtml = tableHtml.replace(progressBarRegex, function(match, filled, empty) {
                const totalLength = filled.length + empty.length;
                const progressPercent = (filled.length / totalLength) * 100;
                
                return `
                <div class="progress-bar-container" title="进度: ${filled.length}/${totalLength} (${progressPercent.toFixed(1)}%)">
                    <div class="progress-bar-fill" style="width: ${progressPercent}%"></div>
                </div>
                <span style="font-size: 0.9em; color: var(--obsidian-text-muted); margin-left: 5px;">
                    ${filled.length}/${totalLength}
                </span>
                `;
            });
            
            // 检测高置信度文本: Confidence > 0.8
            const confidenceRegex /> (\d+\.\d+)/g;
            tableHtml = tableHtml.replace(confidenceRegex, function(match, confidence) {
                const confValue = parseFloat(confidence);
                if (confValue > 0.8) {
                    return `> <span class="confidence-gold">${confidence}</span>`;
                }
                return match;
            });
            
            // 检测策略标签: [S1], [Formula XX]
            const strategyRegex = /\[(S\d+|Formula \d+): ([^\]]+)\]/g;
            tableHtml = tableHtml.replace(strategyRegex, function(match, prefix, name) {
                return `<span class="strategy-tag ${prefix.includes('S1') ? 'gold' : ''}">${prefix}: ${name}</span>`;
            });
            
            return tableHtml;
        };
        
        // 重写段落渲染，检测雷达条目
        const originalParagraph = renderer.paragraph;
        renderer.paragraph = function(text) {
            // 检测雷达条目模式: [Formula XX: Name] → Symbol (Name) | Score: XX | Action: XXX
            const radarRegex = /\[(Formula \d+): ([^\]]+)\] → \*\*([^ ]+) \(([^)]+)\)\*\* \| Score: (\d+) \| Confidence: ([\d.]+) \| Action: ([^|]+) ([^\n]+)/g;
            
            let processedText = text;
            let match;
            while ((match = radarRegex.exec(text)) !== null) {
                const [full, formula, formulaName, symbol, name, score, confidence, actionEmoji, actionText] = match;
                const confValue = parseFloat(confidence);
                const scoreValue = parseInt(score);
                
                const replacement = `
                <div style="margin: 15px 0; padding: 15px; background: rgba(36, 40, 59, 0.5); border-radius: 8px; border-left: 4px solid ${confValue > 0.8 ? 'var(--obsidian-accent-gold)' : 'var(--obsidian-accent)'};">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <div>
                            <span class="strategy-tag ${confValue > 0.8 ? 'gold' : ''}">${formula}: ${formulaName}</span>
                            <strong style="font-size: 1.1em;">${symbol}</strong>
                            <span style="color: var(--obsidian-text-muted);">(${name})</span>
                        </div>
                        <div style="font-weight: bold; font-size: 1.2em; color: ${scoreValue > 80 ? 'var(--obsidian-success)' : scoreValue > 70 ? 'var(--obsidian-accent)' : 'var(--obsidian-warning)'}">
                            ${score}
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.95em;">
                        <div>
                            <span style="color: var(--obsidian-text-muted);">置信度: </span>
                            <span class="${confValue > 0.8 ? 'confidence-gold' : ''}" style="font-weight: 600;">${confidence}</span>
                        </div>
                        <div>
                            ${actionEmoji} <strong>${actionText.trim()}</strong>
                        </div>
                    </div>
                </div>
                `;
                
                processedText = processedText.replace(full, replacement);
            }
            
            return originalParagraph.call(this, processedText);
        };
        
        // 配置marked
        marked.setOptions({
            renderer: renderer,
            breaks: true,
            gfm: true,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });
        
        // 从URL参数获取文件名
        function getFilenameFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            let file = urlParams.get('file');
            if (!file) {
                // 尝试从路径推断
                const path = window.location.pathname;
                if (path.includes('/master-audit/')) {
                    const match = path.match(/\/master-audit\/([^\/]+\.md)/);
                    if (match) {
                        file = match[1];
                    }
                }
            }
            return file || 'PORTFOLIO.md'; // 默认文件
        }
        
        // 加载Markdown文件
        async function loadMarkdownFile(filename) {
            try {
                const response = await fetch(filename);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const markdown = await response.text();
                return markdown;
            } catch (error) {
                console.error('加载Markdown文件失败:', error);
                return `# 加载文件失败\n\n**文件**: ${filename}\n\n**错误**: ${error.message}\n\n请检查文件是否存在，或联系系统管理员。`;
            }
        }
        
        // 渲染Markdown
        async function renderMarkdown() {
            const filename = getFilenameFromUrl();
            document.getElementById('filename').textContent = filename;
            
            const markdown = await loadMarkdownFile(filename);
            const html = marked.parse(markdown);
            document.getElementById('preview').innerHTML = html;
            
            // 应用语法高亮
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            
            // 手动处理不在表格中的进度条
            document.querySelectorAll('p, td, li').forEach(element => {
                const text = element.innerHTML;
                const progressRegex = /\[(▓+)(░+)\]/g;
                if (progressRegex.test(text)) {
                    element.innerHTML = element.innerHTML.replace(progressRegex, function(match, filled, empty) {
                        const totalLength = filled.length + empty.length;
                        const progressPercent = (filled.length / totalLength) * 100;
                        
                        return `
                        <div class="progress-bar-container" title="进度: ${filled.length}/${totalLength} (${progressPercent.toFixed(1)}%)" style="display: inline-block;">
                            <div class="progress-bar-fill" style="width: ${progressPercent}%"></div>
                        </div>
                        <span style="font-size: 0.9em; color: var(--obsidian-text-muted); margin-left: 5px; display: inline-block;">
                            ${filled.length}/${totalLength}
                        </span>
                        `;
                    });
                }
            });
        }
        
        // 刷新内容
        function refreshContent() {
            document.getElementById('preview').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--obsidian-accent);"></i>
                    <p style="margin-top: 20px;">正在重新加载...</p>
                </div>
            `;
            renderMarkdown();
        }
        
        // 下载原始Markdown文件
        function downloadMarkdown() {
            const filename = getFilenameFromUrl();
            const preview = document.getElementById('preview');
            const tempLink = document.createElement('a');
            
            // 获取原始内容需要重新加载
            loadMarkdownFile(filename).then(content => {
                const blob = new Blob([content], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                tempLink.href = url;
                tempLink.download = filename;
                document.body.appendChild(tempLink);
                tempLink.click();
                document.body.removeChild(tempLink);
                URL.revokeObjectURL(url);
            });
        }
        
        // 页面加载完成后渲染
        document.addEventListener('DOMContentLoaded', renderMarkdown);
        
        // 监听URL变化
        window.addEventListener('popstate', renderMarkdown);
    </script>
</body>
</html>
