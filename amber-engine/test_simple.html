<!DOCTYPE html>
<html>
<head>
    <title>简单测试 - 青铜法典</title>
    <style>
        .card { border: 1px solid #ccc; padding: 10px; margin: 5px; display: inline-block; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    </style>
</head>
<body>
    <h1>青铜法典 - 简单测试版</h1>
    
    <div id="filterContainer">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="科技自立">科技自立</button>
        <button class="filter-btn" data-filter="战略宽基">战略宽基</button>
    </div>
    
    <div class="grid" id="etfGrid">
        <!-- 卡片将由JavaScript生成 -->
    </div>
    
    <script>
        // 简单的ETF数据
        const etfData = [
            {"code": "510300", "name": "华泰柏瑞沪深300ETF", "sector": "战略宽基"},
            {"code": "512480", "name": "国联安半导体ETF", "sector": "科技自立"},
            {"code": "518880", "name": "华安黄金ETF", "sector": "安全韧性"},
            {"code": "159915", "name": "易方达创业板ETF", "sector": "战略宽基"},
            {"code": "510050", "name": "华夏上证50ETF", "sector": "战略宽基"}
        ];
        
        // 等待DOM加载
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM已加载，开始渲染...');
            
            // 初始化筛选按钮
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const filter = this.dataset.filter;
                    renderETFs(filter);
                    
                    // 更新按钮状态
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
            
            // 渲染函数
            function renderETFs(filter = 'all') {
                const grid = document.getElementById('etfGrid');
                grid.innerHTML = '';
                
                const filtered = etfData.filter(etf => 
                    filter === 'all' || etf.sector === filter
                );
                
                console.log(`渲染 ${filtered.length} 支标的`);
                
                filtered.forEach(etf => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <strong>${etf.code}</strong><br>
                        ${etf.name}<br>
                        <small>${etf.sector}</small>
                    `;
                    grid.appendChild(card);
                });
            }
            
            // 初始渲染
            renderETFs('all');
            console.log('初始渲染完成');
        });
    </script>
</body>
</html>
