# finance.cheese.ai - 琥珀引擎生产环境配置
# 生成时间: 2026-03-18 12:15 CST

server {
    listen 80;
    listen [::]:80;
    server_name finance.cheese.ai;
    
    # 重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name finance.cheese.ai;
    
    # SSL证书配置
    ssl_certificate /etc/nginx/ssl/finance.cheese.ai.crt;
    ssl_certificate_key /etc/nginx/ssl/finance.cheese.ai.key;
    
    # SSL优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 根目录配置
    root /home/luckyelite/.openclaw/workspace/amber-engine/output;
    index index.html;
    
    # 访问日志
    access_log /var/log/nginx/finance.cheese.ai.access.log;
    error_log /var/log/nginx/finance.cheese.ai.error.log;
    
    # Gzip压缩配置
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # 静态资源缓存配置
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 静态文件目录
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 证书下载特殊处理
    location /static/cert/ {
        add_header Content-Disposition "attachment";
        expires off;
    }
    
    # 股票页面目录
    location /stock/ {
        try_files $uri $uri/ /stock/$1/index.html;
    }
    
    # 文章页面目录
    location /article/ {
        try_files $uri $uri/ /article/$1/index.html;
    }
    
    # 默认位置处理
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问敏感文件
    location ~* \.(sql|db|log|env|bak|old)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}